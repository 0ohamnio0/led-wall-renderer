<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tunnelwisp — LED Wall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
    #canvas-wrap { position: relative; }
    canvas { display: block; image-rendering: pixelated; }
    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; align-items: center; z-index: 10;
    }
    #btn-record {
      padding: 8px 24px; font-size: 14px; font-family: monospace; font-weight: bold;
      border: 2px solid #fff; border-radius: 6px; background: rgba(0,0,0,0.7);
      color: #fff; cursor: pointer; transition: all 0.2s;
    }
    #btn-record:hover { background: rgba(255,255,255,0.15); }
    #btn-record.recording { border-color: #f44; color: #f44; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    #status {
      color: #888; font-size: 13px; font-family: monospace;
    }
    /* LED layout overlay — door indicator */
    .door-label {
      position: absolute; color: rgba(255,255,255,0.15); font-size: 10px;
      pointer-events: none; display: flex; align-items: center; justify-content: center;
      border: 1px dashed rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
  <div id="controls">
    <button id="btn-record">● REC (1 min)</button>
    <span id="status">Ready — 3584×960 LED</span>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
